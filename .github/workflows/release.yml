name: Desktop/native release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-native:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system libraries for PDF-capable package import
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 shared-mime-info

      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[packaging,dev]"

      - name: Run tests
        run: python -m pytest

      - name: Build native executable
        run: >
          python scripts/build_native.py
          --app-name rad-followup-auditor
          --project-name rad-followup-auditor
          --module rad_followup_auditor.cli
          --package rad_followup_auditor

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: rad-followup-auditor-${{ runner.os }}-${{ runner.arch }}
          path: dist/native/*

  github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and attach binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" artifacts/* \
            --title "rad-followup-auditor ${GITHUB_REF_NAME}" \
            --notes "Native Windows, macOS, and Linux command-line builds generated by GitHub Actions. These builds are intended for local analysis of de-identified or synthetic radiology report CSVs."
